<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pro</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
}

/* Sidebar */
#sidebar{
    position:fixed;
    top:0;
    right:0;
    width:230px;
    height:100vh;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(10px);
    transition:0.3s;
    padding-top:60px;
}

/* collapsed */
#sidebar.closed{
    width:70px;
}

/* content */
#content{
    margin-right:230px;
    padding:20px;
    transition:0.3s;
}

#sidebar.closed ~ #content{
    margin-right:70px;
}

/* toggle */
.toggle-btn{
    position:fixed;
    top:10px;
    right:10px;
    font-size:24px;
    cursor:pointer;
    background:rgba(0,0,0,0.4);
    padding:6px 10px;
    border-radius:8px;
    z-index:1000;
}

/* nav */
.nav-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px;
    cursor:pointer;
    transition:0.3s;
}

.nav-item:hover{
    background:#00c6ff;
}

/* hide text when collapsed */
#sidebar.closed .text{
    display:none;
}

/* sections */
.section{
    display:none;
}

.section.active{
    display:block;
}

/* cards */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
}

.card-box{
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
    cursor:pointer;
    text-decoration:none;
    color:white;
    border:1px solid rgba(255,255,255,0.1);
}

.card-box:hover{
    transform:translateY(-5px);
    background:rgba(255,255,255,0.2);
}

</style>
</head>

<body>

<!-- زر الهامبرغر -->
<div class="toggle-btn" onclick="toggleSidebar()">
    <i class="bi bi-list"></i>
</div>

<!-- Sidebar -->
<div id="sidebar">

    <div class="nav-item" onclick="showSection('about')">
        <i class="bi bi-person-circle"></i>
        <span class="text">التعريف</span>
    </div>

    <div class="nav-item" onclick="showSection('quiz')">
        <i class="bi bi-journal-text"></i>
        <span class="text">الاختبارات</span>
    </div>

    <div class="nav-item" onclick="showSection('other')">
        <i class="bi bi-grid-3x3-gap"></i>
        <span class="text">متنوعة</span>
    </div>

</div>

<!-- Content -->
<div id="content">

    <!-- التعريف -->
    <div id="about" class="section active">
        <h2>👤 التعريف</h2>

        <div class="cards">
            <div class="card-box">
                <i class="bi bi-person fs-2"></i>
                <p>من أنا</p>
            </div>

            <div class="card-box">
                <i class="bi bi-briefcase fs-2"></i>
                <p>مهاراتي</p>
            </div>

            <div class="card-box">
                <i class="bi bi-envelope fs-2"></i>
                <p>تواصل</p>
            </div>
        </div>
    </div>

    <!-- الاختبارات -->
    <div id="quiz" class="section">
        <h2>📝 الاختبارات</h2>

        <div class="cards">

            <a href="elctron.html" class="card-box">
                <i class="bi bi-shield-check fs-2"></i>
                <p>أخلاقيات الحاسوب</p>
            </a>

            <a href="viros.html" class="card-box">
                <i class="bi bi-bug fs-2"></i>
                <p>فيروسات الحاسوب</p>
            </a>
            
            <a href="test-ai-1.html" class="card-box">
                <i class="bi bi-shield-check fs-2"></i>
                <p>ذكاء اصطناعي صح وخطأ</p>
            </a>

            <a href="test-ai-2.html" class="card-box">
                <i class="bi bi-shield-check fs-2"></i>
                <p>ذكاء اصطناعي اختيار من متعدد</p>
            </a>

        </div>
    </div>

    <!-- أخرى -->
    <div id="other" class="section">
        <h2>🌐 متنوعة</h2>

        <div class="cards">

            <div class="card-box">
                <i class="bi bi-file-earmark fs-2"></i>
                <p>صفحة 1</p>
            </div>

            <div class="card-box">
                <i class="bi bi-folder fs-2"></i>
                <p>صفحة 2</p>
            </div>

            <div class="card-box">
                <i class="bi bi-box fs-2"></i>
                <p>صفحة 3</p>
            </div>

        </div>
    </div>

</div>

<script>

/* sidebar toggle */
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("closed");
}

/* show sections */
function showSection(id){

    document.querySelectorAll(".section").forEach(sec=>{
        sec.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
